# See .buildkite/README.md for details about this pipeline.

common:
  - &cache-common-args
    backend: s3
    compression: tgz
    restore: pipeline

  - _: &cache-gradle-home-manifest
      - "build.gradle.kts"
      - "gradle.properties"
      - "settings.gradle.kts"

  - &cache-gradle-home-args
    <<: *cache-common-args
    path: ".gradle-home"
    manifest: *cache-gradle-home-manifest

  - &cache-gradle-home
    cache#v1.11.1:
      <<: *cache-gradle-home-args

  - _: &cache-node-modules-manifest
      - "yarn.lock"

  - &cache-node-modules-args
    <<: *cache-common-args
    path: "node_modules"
    manifest: *cache-node-modules-manifest

  - &cache-node-modules
    cache#v1.11.1:
      <<: *cache-node-modules-args

  - &cache-pip-args
    <<: *cache-common-args
    path: "scripts/.pip-cache"
    manifest:
      - "scripts/requirements.txt"
      - ".buildkite/scripts/check-scripts.sh"

  - _: &cache-buildx-manifest
      - "docker/Dockerfile"
      - "docker/Makefile"
      - "docker/start.sh"
      - "build.gradle.kts"
      - "gradle.properties"
      - "settings.gradle.kts"

  - &load-secrets
    seek-oss/aws-sm#v2.4.1:
      json-to-env:
        - secret-id: "buildkite_build_secrets"
        - secret-id: "terraware_server_build_secrets"

  - &restore-build-cache
    artifacts#v1.9.4:
      download: ".gradle-home/caches/build-cache-1"
      compressed: "build-cache.tgz"

  - &restore-build
    artifacts#v1.9.4:
      download: "build"
      compressed: "build.tgz"

  - &restore-dot-gradle
    artifacts#v1.9.4:
      download: ".gradle"
      compressed: "dot-gradle.tgz"

  - &shallow-clone
    peakon/git-shallow-clone#v0.0.1:
      depth: 1

agents:
  # Run all steps on the same kind of runner.
  queue: "x86-8core"

env:
  BUILDKITE_ARTIFACT_UPLOAD_DESTINATION: "s3://terraformation-buildkite-cache/artifacts/$BUILDKITE_PIPELINE_ID/$BUILDKITE_BUILD_ID/$BUILDKITE_JOB_ID"

steps:
  - label: ":graphite: CI optimizer"
    key: "graphite-ci-optimizer"
    soft_fail: true
    plugins:
      - *shallow-clone
      - *load-secrets
    command: .buildkite/scripts/graphite-optimizer.sh

  - wait: ~
    continue_on_failure: true

  - label: ":gradle: Build and test"
    key: "build-and-test"
    plugins:
      - *shallow-clone
      - cache#v1.11.1:
          <<: *cache-gradle-home-args
          save:
            - file
      - cache#v1.11.1:
          <<: *cache-node-modules-args
          save:
            - file
      - artifacts#v1.9.4:
          upload: "build"
          compressed: "build.tgz"
      - artifacts#v1.9.4:
          upload: ".gradle"
          compressed: "dot-gradle.tgz"
      - artifacts#v1.9.4:
          upload: ".gradle-home/caches/build-cache-1"
          compressed: "build-cache.tgz"
    command: .buildkite/scripts/build-and-test.sh
    artifact_paths:
      # We need to upload the test results as individual files so they can be consumed by the
      # junit-annotate plugin.
      - "build/test-results/**/*.xml"

  - label: ":junit: Run external service integration tests"
    key: "external-tests"
    depends_on: "build-and-test"
    soft_fail: true
    if: "build.branch != 'main' && build.tag == null"
    plugins:
      - *shallow-clone
      - *cache-gradle-home
      - *cache-node-modules
      - *restore-build-cache
      - *restore-build
      - *restore-dot-gradle
      - *load-secrets
    command: .buildkite/scripts/run-external-tests.sh
    artifact_paths:
      # We need to upload the test results as individual files so they can be consumed by the
      # junit-annotate plugin.
      - "build/test-results/**/*.xml"
    env:
      TEST_S3_BUCKET_NAME: "terraformation-buildkite-test"

  - label: ":python: Check scripts"
    key: "check-scripts"
    depends_on:
      - step: "build-and-test"
      - step: "external-tests"
        allow_failure: true
    if_changed: "scripts/**"
    plugins:
      - *shallow-clone
      - cache#v1.11.1:
          <<: *cache-pip-args
          save:
            - "file"
    command: .buildkite/scripts/check-scripts.sh

  - label: ":junit: Annotate build with test results"
    key: "junit-annotate"
    depends_on:
      - step: "build-and-test"
      - step: "check-scripts"
      - step: "external-tests"
        allow_failure: true
    plugins:
      - *shallow-clone
      - junit-annotate#v2.7.0:
          artifacts: "build/test-results/**/*.xml"
          always-annotate: true
          report-slowest: 10

  - label: ":docker: Build and push Docker image"
    key: "docker"
    depends_on: "junit-annotate"
    plugins:
      - *shallow-clone
      - *load-secrets
      - *cache-gradle-home
      - *cache-node-modules
      - cache#v1.11.1:
          <<: *cache-common-args
          path: ".buildx-cache"
          manifest: *cache-buildx-manifest
          save:
            - file
      - *restore-build-cache
      - *restore-build
      - *restore-dot-gradle
    command: .buildkite/scripts/docker-build-push.sh

  - label: ":buildkite: Promote Gradle home cache to pipeline-level"
    key: "promote-gradle-cache"
    depends_on: "docker"
    branches: "main"
    if_changed: *cache-gradle-home-manifest
    plugins:
      - *shallow-clone
      - cache#v1.11.1:
          <<: *cache-gradle-home-args
          save: "pipeline"
          force: true
    command: "rm -rf .gradle-home/caches/build-cache-1"

  - label: ":buildkite: Promote Node modules cache to pipeline-level"
    key: "promote-node-cache"
    depends_on:
      - "docker"
      - "promote-gradle-cache"
    branches: "main"
    if_changed: *cache-node-modules-manifest
    plugins:
      - *shallow-clone
      - cache#v1.11.1:
          <<: *cache-node-modules-args
          save: "pipeline"
          force: true
    command: "true"

  - label: ":buildkite: Promote branch-level script cache to pipeline-level"
    key: "promote-script-cache"
    depends_on:
      - "docker"
      - "promote-gradle-cache"
      - "promote-node-cache"
    branches: "main"
    if_changed: "scripts/**"
    plugins:
      - *shallow-clone
      - cache#v1.11.1:
          <<: *cache-pip-args
          save: "pipeline"
          force: true
    command: "true"

  - label: ":buildkite: Promote Docker build cache to pipeline-level"
    key: "promote-buildx-cache"
    depends_on:
      - "docker"
      - "promote-gradle-cache"
      - "promote-node-cache"
      - "promote-script-cache"
    branches: "main"
    if_changed: *cache-buildx-manifest
    plugins:
      - *shallow-clone
      - cache#v1.11.1:
          <<: *cache-common-args
          manifest: *cache-buildx-manifest
          path: ".buildx-cache"
          save: "pipeline"
          force: true
    command: "true"

  - label: ":amazon-ecs: Deploy to ECS"
    key: "deploy"
    concurrency: 1
    concurrency_group: "terraware-server/deploy"
    depends_on:
      - "docker"
      - "promote-buildx-cache"
      - "promote-gradle-cache"
      - "promote-node-cache"
      - "promote-script-cache"
    if: "build.branch == 'main' || build.tag =~ /^v2[0-9]+\\.[0-9]+/"
    plugins:
      - *shallow-clone
      - *load-secrets
    command: .buildkite/scripts/deploy-ecs.sh

  - label: ":slack: Release notes & Jira transitions"
    key: "release-notes"
    depends_on: "deploy"
    if: "build.tag =~ /^v2[0-9]+\\.[0-9]+/"
    plugins:
      - *shallow-clone
      - *load-secrets
    command: .buildkite/scripts/release-notes.sh

  - label: ":speech_balloon: Notify PR of staging deploy"
    key: "notify-pr"
    depends_on:
      - "deploy"
      - "release-notes"
    branches: "main"
    plugins:
      - *shallow-clone
      - *load-secrets
    command: .buildkite/scripts/notify-pr.sh

  - label: ":books: Generate and deploy unreleased commits log"
    key: "generate-unreleased"
    depends_on:
      - "notify-pr"
    branches:
      - "main"
    plugins:
      - *shallow-clone
      - *load-secrets
    command: .buildkite/scripts/deploy-main-docs.sh

  - label: ":books: Generate and deploy docs"
    key: "generate-docs"
    depends_on:
      - "deploy"
      - "generate-unreleased"
      - "release-notes"
    if: "build.tag =~ /^v2[0-9]+\\.[0-9]+/"
    plugins:
      - *shallow-clone
      - *load-secrets
      - *cache-gradle-home
      - *restore-build-cache
      - *restore-build
      - *restore-dot-gradle
    command: .buildkite/scripts/deploy-release-docs.sh

notify:
  - slack:
      channels:
        - "#buildkite-builds"
    if: build.state == "failed" && build.branch == "main"
